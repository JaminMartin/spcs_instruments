name: Update Documentation

on:
  push:
    branches: [ master, main, spcs-devel ]
    paths:
      - 'src/**/*.py'  
  workflow_dispatch:   

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  

    - name: Generate Documentation
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          jaminmartin/doc_gen:latest \
          /workspace/src/spcs_instruments/instruments/ \
          /workspace/docs/src/instruments \
          /workspace/docs/src/SUMMARY.md \
          --ignore montana_support \
          --ignore __pycache__

    - name: Create documentation update pull request
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        add-paths: |
          docs/src/instruments
          docs/src/SUMMARY.md
        commit-message: Update documentation from source code
        branch: docs/update-${{ github.ref_name }}-${{ github.run_id }}
        delete-branch: true
        base: ${{ github.ref_name }}
        title: Update documentation from source code
        body: |
          Automated documentation update generated from source code changes.
